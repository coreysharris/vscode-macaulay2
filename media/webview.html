<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macaulay2 Output</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.13.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.13.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.13.11/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="${cssUri}">
    <style>
      html,
      body {
        box-sizing: border-box;
        height: 100%;
        margin: 0;
        max-width: 100%;
        overflow: hidden;
        width: 100%;
      }

      #terminal {
        height: 100vh;
        max-height: 100vh;
        max-width: 100vw;
        overflow-x: hidden;
        overflow-y: auto;
        width: 100vw;
      }

      .M2Cell {
        box-sizing: border-box;
        max-width: 100%;
        min-width: 0;
        overflow-x: auto;
      }

      .M2Html {
        max-width: 100%;
      }

      .M2CompletionMenu {
        background: var(--vscode-editorWidget-background, #f3f3f3);
        border: 1px solid var(--vscode-editorWidget-border, #c8c8c8);
        box-shadow: 0 2px 8px rgba(0, 0, 0, .22);
        color: var(--vscode-editorWidget-foreground, #222);
        font-family: Iosevka, monospace;
        font-size: 13px;
        list-style: none;
        margin: 0;
        max-height: 240px;
        min-width: 260px;
        overflow: auto;
        padding: 2px 0;
        position: fixed;
        z-index: 1000;
      }

      .M2CompletionItem {
        align-items: center;
        cursor: default;
        display: flex;
        gap: 1.5em;
        justify-content: space-between;
        line-height: 1.5;
        padding: 1px 8px;
        white-space: nowrap;
      }

      .M2CompletionItem.selected {
        background: var(--vscode-list-activeSelectionBackground, #0e639c);
        color: var(--vscode-list-activeSelectionForeground, #fff);
      }

      .M2CompletionKind {
        color: var(--vscode-descriptionForeground, #666);
        font-size: 11px;
      }

      .M2CompletionItem.selected .M2CompletionKind {
        color: inherit;
      }
    </style>
    <script type="module" src="${scriptUri}"></script>
    <script type="module" src="${VGUri}"></script>
  </head>
  <body>
    <div id="terminal" class="M2Text">
      <span style="z-index:1; position:fixed; right:0px; top:0px;">
        <button id="resetBtn">RESET</button><button id="interruptBtn">INTERRUPT</button>
      </span>
    </div>
  </body>
</html>
